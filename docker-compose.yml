version: "3"
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      # :cached を付与して、高速化
      - .:/usr/src/app:cached
      # vendor以下などホストと連携しなくてもよいものを、上書きして永続化の対象外にする。
      # exclude volumes
      - /usr/src/app/vendor
      - /usr/src/app/tmp
      - /usr/src/app/log
      - /usr/src/app/.git
    tty: true

volumes:
  bundle:
    driver: local